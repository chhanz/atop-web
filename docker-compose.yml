services:
  atop-web:
    build: .
    container_name: atop-web
    environment:
      # Directory inside the container where atop rawlog files live. The server
      # side file browser reads this path and also stamps it into /healthz.
      # Leave empty to disable the browser.
      - ATOP_LOG_DIR=/var/log/atop
      # External URL prefix when running behind a prefix stripping reverse
      # proxy. Leave empty for root deployment. See README for nginx / Caddy /
      # Traefik examples.
      - ATOP_ROOT_PATH=${ATOP_ROOT_PATH:-}
      # LLM provider: none (default) | bedrock | ollama | openai | anthropic | gemini
      - LLM_PROVIDER=${LLM_PROVIDER:-none}
      # Bedrock settings (used when LLM_PROVIDER=bedrock)
      - BEDROCK_MODEL=${BEDROCK_MODEL:-global.anthropic.claude-sonnet-4-6}
      - AWS_REGION=${AWS_REGION:-ap-northeast-2}
      # AWS credentials / Bedrock API key: pass through from the host ONLY when
      # set. The bare `- NAME` form (no `=`) is critical - the `${NAME:-}` form
      # injects an empty string, and boto3 >= 1.39 treats the mere presence of
      # AWS_BEARER_TOKEN_BEDROCK in the environment (even when empty) as
      # "use Bedrock bearer auth", which skips SigV4 signing and ignores the
      # EC2 instance profile, producing IncompleteSignatureException on
      # Bedrock Converse. Leave these unset on hosts that rely on IAM
      # instance profiles.
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_BEARER_TOKEN_BEDROCK
    volumes:
      # Bind mount the host directory that atop writes into. Swap the left
      # hand side if your host stores rawlog files elsewhere, for example
      # `- ./logs:/var/log/atop:ro`.
      - /var/log/atop:/var/log/atop:ro
    ports:
      - "${HOST_PORT:-8000}:8000"
    restart: unless-stopped

  test:
    build: .
    environment:
      ATOP_LOG_DIR: /var/log/atop
    volumes:
      - /var/log/atop:/var/log/atop:ro
      - ./:/app
    command: pytest -v
