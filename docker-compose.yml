services:
  atop-web:
    build: .
    container_name: atop-web
    environment:
      # Directory inside the container where atop rawlog files live. The
      # server side file browser reads this path and also stamps it into
      # /healthz. Leave empty to disable the browser.
      ATOP_LOG_DIR: /var/log/atop
      # External URL prefix when running behind a prefix stripping reverse
      # proxy. Leave empty for root deployment. See README for nginx /
      # Caddy / Traefik examples.
      ATOP_ROOT_PATH: ${ATOP_ROOT_PATH:-}
      # LLM provider: none (default) | bedrock | ollama | openai | anthropic | gemini
      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      # Bedrock settings (used when LLM_PROVIDER=bedrock)
      BEDROCK_MODEL: ${BEDROCK_MODEL:-global.anthropic.claude-sonnet-4-6}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      # AWS credentials: leave empty to use EC2 instance profile / IMDSv2
      # (recommended for production). Set explicitly to use access key + secret
      # (+ optional session token for STS temporary credentials / SSO /
      # AssumeRole), or use AWS_BEARER_TOKEN_BEDROCK for a Bedrock-scoped API key.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      # Bedrock API key (boto3 >= 1.39). Alternative to IAM credentials,
      # scoped to bedrock-runtime only. Takes precedence over the default
      # credential chain when set.
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
    volumes:
      # Bind mount the host directory that atop writes into. Swap the left
      # hand side if your host stores rawlog files elsewhere, for example
      # `- ./logs:/var/log/atop:ro`.
      - /var/log/atop:/var/log/atop:ro
    ports:
      - "${HOST_PORT:-8000}:8000"
    restart: unless-stopped

  test:
    build: .
    environment:
      ATOP_LOG_DIR: /var/log/atop
    volumes:
      - /var/log/atop:/var/log/atop:ro
      - ./:/app
    command: pytest -v
